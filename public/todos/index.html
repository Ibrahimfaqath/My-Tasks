<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #111111;
        --surface-2: #1a1a1a;
        --surface-3: #222222;
        --border: #2a2a2a;
        --border-hover: #3a3a3a;
        --text: #ededed;
        --text-muted: #888;
        --text-faint: #555;
        --accent: #5865f2;
        --accent-hover: #4752c4;
        --accent-soft: rgba(88, 101, 242, 0.12);
        --danger: #ef4444;
        --danger-soft: rgba(239, 68, 68, 0.1);
        --success: #22c55e;
        --warn: #f59e0b;
        --radius: 8px;
        --sidebar-width: 220px;
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        overflow: hidden;
      }

      /* ===== SIDEBAR ===== */
      .sidebar {
        width: var(--sidebar-width);
        min-height: 100vh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 20px 12px;
        flex-shrink: 0;
      }

      .sidebar-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        margin-bottom: 24px;
      }

      .sidebar-logo-icon {
        width: 28px;
        height: 28px;
        background: var(--accent);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .sidebar-logo-icon svg {
        width: 15px;
        height: 15px;
        stroke: white;
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .sidebar-logo-text {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.2px;
      }

      .sidebar-section-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.7px;
        padding: 0 10px;
        margin-bottom: 6px;
        margin-top: 16px;
      }

      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        transition: background 0.12s, color 0.12s;
        user-select: none;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
      }

      .nav-item:hover {
        background: var(--surface-2);
        color: var(--text);
      }

      .nav-item.active {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .nav-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .nav-item .count-badge {
        margin-left: auto;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-faint);
        background: var(--surface-3);
        padding: 1px 7px;
        border-radius: 10px;
      }

      .nav-item.active .count-badge {
        background: rgba(88, 101, 242, 0.2);
        color: var(--accent);
      }

      .sidebar-bottom {
        margin-top: auto;
        border-top: 1px solid var(--border);
        padding-top: 16px;
      }

      .user-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: var(--radius);
      }

      .user-avatar {
        width: 30px;
        height: 30px;
        background: var(--accent-soft);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
        flex-shrink: 0;
      }

      .user-name {
        font-size: 13px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .logout-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        transition: background 0.12s, color 0.12s;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        margin-top: 2px;
      }

      .logout-btn:hover {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .logout-btn svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ===== MAIN ===== */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 28px 0;
        gap: 16px;
      }

      .topbar-title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.4px;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .search-box {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 12px;
        width: 220px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .search-box:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.12);
      }

      .search-box svg {
        width: 14px;
        height: 14px;
        stroke: var(--text-faint);
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }

      .search-box input {
        background: none;
        border: none;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        width: 100%;
        padding: 0;
      }

      .search-box input:focus {
        outline: none;
        box-shadow: none;
      }

      .search-box input::placeholder {
        color: var(--text-faint);
      }

      /* ===== CONTENT AREA ===== */
      .content {
        flex: 1;
        padding: 20px 28px 28px;
        overflow-y: auto;
      }

      /* ===== ADD TASK FORM ===== */
      .add-task-form {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 24px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .add-task-form:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.1);
      }

      .add-icon {
        width: 20px;
        height: 20px;
        stroke: var(--text-faint);
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }

      .task-input {
        flex: 1;
        background: none;
        border: none;
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        padding: 0;
      }

      .task-input:focus {
        outline: none;
      }

      .task-input::placeholder {
        color: var(--text-faint);
      }

      .priority-select {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        padding: 5px 8px;
        cursor: pointer;
        transition: border-color 0.15s;
      }

      .priority-select:focus {
        outline: none;
        border-color: var(--accent);
      }

      .add-task-btn {
        background: var(--accent);
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 6px 14px;
        transition: background 0.15s;
        white-space: nowrap;
      }

      .add-task-btn:hover {
        background: var(--accent-hover);
      }

      /* ===== PROGRESS BAR ===== */
      .progress-section {
        margin-bottom: 20px;
      }

      .progress-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .progress-label {
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .progress-pct {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
      }

      .progress-bar-track {
        height: 4px;
        background: var(--surface-3);
        border-radius: 10px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 10px;
        transition: width 0.4s ease;
      }

      /* ===== SECTION HEADER ===== */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .section-count {
        font-size: 11px;
        background: var(--surface-3);
        color: var(--text-faint);
        padding: 1px 7px;
        border-radius: 10px;
        font-weight: 600;
      }

      /* ===== TASK LIST ===== */
      .task-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 24px;
      }

      .task-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        transition: border-color 0.15s, background 0.15s;
        position: relative;
      }

      .task-item:hover {
        border-color: var(--border-hover);
        background: var(--surface-2);
      }

      .task-item.completed-item {
        opacity: 0.55;
      }

      /* Custom checkbox */
      .task-checkbox {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border-hover);
        border-radius: 5px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.15s, border-color 0.15s;
        position: relative;
      }

      .task-checkbox:hover {
        border-color: var(--accent);
      }

      .task-checkbox.checked {
        background: var(--accent);
        border-color: var(--accent);
      }

      .task-checkbox svg {
        width: 11px;
        height: 11px;
        stroke: white;
        fill: none;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0;
        transition: opacity 0.12s;
      }

      .task-checkbox.checked svg {
        opacity: 1;
      }

      /* Priority dot */
      .priority-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .priority-dot.high { background: var(--danger); }
      .priority-dot.medium { background: var(--warn); }
      .priority-dot.low { background: var(--success); }
      .priority-dot.none { background: var(--text-faint); }

      /* Task text (editable) */
      .task-text {
        flex: 1;
        font-size: 14px;
        line-height: 1.5;
        cursor: text;
        border-radius: 4px;
        padding: 2px 4px;
        margin: -2px -4px;
        transition: background 0.12s;
        word-break: break-word;
      }

      .task-text:hover {
        background: var(--surface-3);
      }

      .task-text[contenteditable="true"] {
        outline: none;
        background: var(--surface-3);
        box-shadow: 0 0 0 2px var(--accent);
        border-radius: 4px;
      }

      .task-text.done {
        text-decoration: line-through;
        color: var(--text-faint);
      }

      .task-actions {
        display: flex;
        align-items: center;
        gap: 4px;
        opacity: 0;
        transition: opacity 0.12s;
      }

      .task-item:hover .task-actions {
        opacity: 1;
      }

      .task-action-btn {
        width: 28px;
        height: 28px;
        border: none;
        background: none;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-faint);
        transition: background 0.12s, color 0.12s;
      }

      .task-action-btn:hover {
        background: var(--surface-3);
        color: var(--text);
      }

      .task-action-btn.delete-btn:hover {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .task-action-btn svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ===== EMPTY STATE ===== */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        color: var(--text-faint);
        text-align: center;
        gap: 12px;
      }

      .empty-state svg {
        width: 40px;
        height: 40px;
        stroke: var(--border-hover);
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .empty-state p {
        font-size: 14px;
        color: var(--text-faint);
        line-height: 1.5;
      }

      /* ===== COMPLETED SECTION TOGGLE ===== */
      .completed-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        padding: 6px 0;
        border: none;
        background: none;
        user-select: none;
      }

      .completed-toggle svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 0.2s;
      }

      .completed-toggle.collapsed svg {
        transform: rotate(-90deg);
      }

      /* ===== TOAST NOTIFICATION ===== */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 1000;
      }

      .toast {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 13px;
        font-weight: 500;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        animation: toastIn 0.2s ease forwards;
        max-width: 280px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toast.success { border-left: 3px solid var(--success); }
      .toast.error { border-left: 3px solid var(--danger); }

      @keyframes toastIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ===== MOBILE SIDEBAR ===== */
      .mobile-header {
        display: none;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
      }

      .hamburger {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text);
        padding: 4px;
      }

      .hamburger svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
      }

      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 40;
      }

      @media (max-width: 680px) {
        body { overflow: auto; }

        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          z-index: 50;
          transform: translateX(-100%);
          transition: transform 0.25s ease;
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .sidebar-overlay.visible {
          display: block;
        }

        .mobile-header {
          display: flex;
        }

        .main {
          width: 100%;
        }

        .topbar {
          padding: 16px 20px 0;
          flex-wrap: wrap;
        }

        .search-box {
          width: 100%;
        }

        .content {
          padding: 16px 20px 24px;
        }

        .add-task-form {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>

  <body>
    <!-- Mobile Header -->
    <div class="mobile-header">
      <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span style="font-weight:700;font-size:15px;">My Tasks</span>
      <div style="width:28px;"></div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" aria-label="Navigation">
      <div class="sidebar-logo" aria-hidden="true">
        <div class="sidebar-logo-icon">
          <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <span class="sidebar-logo-text">My Tasks</span>
      </div>

      <div class="sidebar-section-label">Views</div>
      <nav class="sidebar-nav" aria-label="Task filters">
        <button class="nav-item active" data-filter="all" aria-current="true">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          All Tasks
          <span class="count-badge" id="badge-all">0</span>
        </button>
        <button class="nav-item" data-filter="pending">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          In Progress
          <span class="count-badge" id="badge-pending">0</span>
        </button>
        <button class="nav-item" data-filter="completed">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Completed
          <span class="count-badge" id="badge-completed">0</span>
        </button>
      </nav>

      <div class="sidebar-section-label">Priority</div>
      <nav class="sidebar-nav" aria-label="Priority filters">
        <button class="nav-item" data-filter="priority-high">
          <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
          High
          <span class="count-badge" id="badge-high">0</span>
        </button>
        <button class="nav-item" data-filter="priority-medium">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Medium
          <span class="count-badge" id="badge-medium">0</span>
        </button>
        <button class="nav-item" data-filter="priority-low">
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          Low
          <span class="count-badge" id="badge-low">0</span>
        </button>
      </nav>

      <div class="sidebar-bottom">
        <div class="user-row">
          <div class="user-avatar" id="userAvatar">?</div>
          <span class="user-name" id="userName">...</span>
        </div>
        <button class="logout-btn" id="logoutBtn">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" aria-label="Task list">
      <div class="topbar">
        <h1 class="topbar-title" id="viewTitle">All Tasks</h1>
        <div class="topbar-actions">
          <div class="search-box" role="search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search tasks..." aria-label="Search tasks" />
          </div>
        </div>
      </div>

      <div class="content">
        <!-- Progress -->
        <div class="progress-section" id="progressSection">
          <div class="progress-meta">
            <span class="progress-label">Progress</span>
            <span class="progress-pct" id="progressPct">0%</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
          </div>
        </div>

        <!-- Add Task Form -->
        <form class="add-task-form" id="addTaskForm" aria-label="Add new task">
          <svg class="add-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <input class="task-input" type="text" id="taskInput" placeholder="Add a new task and press Enter..." autocomplete="off" aria-label="New task text" />
          <select class="priority-select" id="prioritySelect" aria-label="Priority">
            <option value="none">No priority</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
          <button class="add-task-btn" type="submit">Add</button>
        </form>

        <!-- Pending tasks -->
        <div id="pendingSection">
          <div class="section-header">
            <span class="section-title">
              Tasks
              <span class="section-count" id="pendingCount">0</span>
            </span>
          </div>
          <ul class="task-list" id="pendingList" aria-label="Pending tasks" role="list"></ul>
          <div class="empty-state" id="pendingEmpty" style="display:none;">
            <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            <p>All caught up! Add a task above to get started.</p>
          </div>
        </div>

        <!-- Completed tasks -->
        <div id="completedSection">
          <button class="completed-toggle" id="completedToggle" aria-expanded="true">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            Completed
            <span class="section-count" id="completedCount">0</span>
          </button>
          <ul class="task-list" id="completedList" aria-label="Completed tasks" role="list"></ul>
        </div>
      </div>
    </main>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <script>
      // ===== STATE =====
      let allTodos = [];
      let activeFilter = 'all';
      let completedCollapsed = false;

      // ===== DOM REFS =====
      const pendingList = document.getElementById('pendingList');
      const completedList = document.getElementById('completedList');
      const pendingEmpty = document.getElementById('pendingEmpty');
      const searchInput = document.getElementById('searchInput');
      const viewTitle = document.getElementById('viewTitle');
      const completedToggle = document.getElementById('completedToggle');

      // ===== INIT =====
      (async () => {
        try {
          const res = await fetch('/api/me');
          if (!res.ok) { window.location.href = '/login/'; return; }
          const { success, data } = await res.json();
          if (success) {
            document.getElementById('userName').textContent = data.username;
            document.getElementById('userAvatar').textContent = data.username.charAt(0).toUpperCase();
            await fetchTodos();
          } else {
            window.location.href = '/login/';
          }
        } catch {
          window.location.href = '/login/';
        }
      })();

      // ===== FETCH TODOS =====
      async function fetchTodos() {
        try {
          const res = await fetch('/api/todos');
          const { success, data } = await res.json();
          if (success) {
            allTodos = data;
            renderAll();
          }
        } catch (e) {
          showToast('Failed to load tasks.', 'error');
        }
      }

      // ===== RENDER =====
      function renderAll() {
        updateBadges();
        renderFiltered();
      }

      function getFilteredTodos() {
        let todos = [...allTodos];

        // Filter by sidebar selection
        if (activeFilter === 'pending') {
          todos = todos.filter(t => t.status !== 'completed');
        } else if (activeFilter === 'completed') {
          todos = todos.filter(t => t.status === 'completed');
        } else if (activeFilter.startsWith('priority-')) {
          const p = activeFilter.replace('priority-', '');
          todos = todos.filter(t => (t.priority || 'none') === p);
        }

        // Search filter
        const q = searchInput.value.trim().toLowerCase();
        if (q) {
          todos = todos.filter(t => t.note.toLowerCase().includes(q));
        }

        return todos;
      }

      function renderFiltered() {
        const todos = getFilteredTodos();

        const pending = todos.filter(t => t.status !== 'completed');
        const completed = todos.filter(t => t.status === 'completed');

        renderList(pendingList, pending);
        renderList(completedList, completed);

        document.getElementById('pendingCount').textContent = pending.length;
        document.getElementById('completedCount').textContent = completed.length;

        pendingEmpty.style.display = pending.length === 0 ? 'flex' : 'none';

        // Progress
        const total = allTodos.length;
        const done = allTodos.filter(t => t.status === 'completed').length;
        const pct = total === 0 ? 0 : Math.round((done / total) * 100);
        document.getElementById('progressPct').textContent = pct + '%';
        document.getElementById('progressBar').style.width = pct + '%';
      }

      function renderList(container, todos) {
        container.innerHTML = '';
        todos.forEach(todo => container.appendChild(createTaskEl(todo)));
      }

      function createTaskEl(todo) {
        const li = document.createElement('li');
        li.className = 'task-item' + (todo.status === 'completed' ? ' completed-item' : '');
        li.dataset.id = todo.id;
        li.setAttribute('role', 'listitem');

        const priority = todo.priority || 'none';

        li.innerHTML = `
          <div class="task-checkbox ${todo.status === 'completed' ? 'checked' : ''}" role="checkbox" aria-checked="${todo.status === 'completed'}" tabindex="0" aria-label="Mark as ${todo.status === 'completed' ? 'incomplete' : 'complete'}">
            <svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg>
          </div>
          <span class="priority-dot ${priority}" title="Priority: ${priority}"></span>
          <span class="task-text ${todo.status === 'completed' ? 'done' : ''}" contenteditable="false" spellcheck="false">${escHtml(todo.note)}</span>
          <div class="task-actions">
            <button class="task-action-btn edit-btn" title="Edit task" aria-label="Edit task">
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="task-action-btn delete-btn" title="Delete task" aria-label="Delete task">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </div>
        `;

        // Checkbox toggle
        const checkbox = li.querySelector('.task-checkbox');
        checkbox.addEventListener('click', () => toggleStatus(todo.id, todo.status !== 'completed'));
        checkbox.addEventListener('keydown', (e) => {
          if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            toggleStatus(todo.id, todo.status !== 'completed');
          }
        });

        // Edit button
        const editBtn = li.querySelector('.edit-btn');
        const textEl = li.querySelector('.task-text');
        editBtn.addEventListener('click', () => startEdit(textEl, todo));

        // Double-click to edit
        textEl.addEventListener('dblclick', () => startEdit(textEl, todo));

        // Delete button
        li.querySelector('.delete-btn').addEventListener('click', () => deleteTask(todo.id, li));

        return li;
      }

      // ===== INLINE EDIT =====
      function startEdit(textEl, todo) {
        if (textEl.contentEditable === 'true') return;
        textEl.contentEditable = 'true';
        textEl.focus();

        // Move cursor to end
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(textEl);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);

        function finishEdit() {
          textEl.contentEditable = 'false';
          const newText = textEl.textContent.trim();
          if (newText && newText !== todo.note) {
            saveEdit(todo.id, newText, textEl);
          } else if (!newText) {
            textEl.textContent = todo.note;
          }
        }

        textEl.addEventListener('blur', finishEdit, { once: true });
        textEl.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
          if (e.key === 'Escape') { textEl.textContent = todo.note; textEl.blur(); }
        }, { once: false });
      }

      async function saveEdit(id, newNote, textEl) {
        try {
          const res = await fetch(`/api/todos/${id}/note`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ note: newNote }),
          });
          const result = await res.json();
          if (result.success) {
            const todo = allTodos.find(t => t.id === id);
            if (todo) todo.note = newNote;
            showToast('Task updated.', 'success');
          } else {
            showToast('Failed to update task.', 'error');
          }
        } catch {
          showToast('Failed to update task.', 'error');
        }
      }

      // ===== TOGGLE STATUS =====
      async function toggleStatus(id, markComplete) {
        const newStatus = markComplete ? 'completed' : 'pending';
        // Optimistic update
        const todo = allTodos.find(t => t.id === id);
        if (todo) { todo.status = newStatus; renderAll(); }

        try {
          const res = await fetch(`/api/todos/${id}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus }),
          });
          if (!res.ok) throw new Error();
        } catch {
          // Rollback
          if (todo) { todo.status = markComplete ? 'pending' : 'completed'; renderAll(); }
          showToast('Failed to update task.', 'error');
        }
      }

      // ===== DELETE =====
      async function deleteTask(id, liEl) {
        // Optimistic removal
        liEl.style.opacity = '0';
        liEl.style.transform = 'translateX(8px)';
        liEl.style.transition = 'opacity 0.2s, transform 0.2s';
        setTimeout(() => liEl.remove(), 200);
        allTodos = allTodos.filter(t => t.id !== id);
        updateBadges();

        try {
          const res = await fetch(`/api/todos/${id}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
          });
          if (!res.ok) throw new Error();
          showToast('Task deleted.', 'success');
        } catch {
          await fetchTodos();
          showToast('Failed to delete task.', 'error');
        }
      }

      // ===== ADD TASK =====
      document.getElementById('addTaskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const note = document.getElementById('taskInput').value.trim();
        const priority = document.getElementById('prioritySelect').value;
        if (!note) return;

        try {
          const res = await fetch('/api/todos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ note, priority }),
          });
          const { success, data } = await res.json();
          if (success) {
            allTodos.unshift(data);
            document.getElementById('taskInput').value = '';
            document.getElementById('prioritySelect').value = 'none';
            renderAll();
            showToast('Task added.', 'success');
          }
        } catch {
          showToast('Failed to add task.', 'error');
        }
      });

      // ===== SIDEBAR FILTER =====
      document.querySelectorAll('.nav-item[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.nav-item').forEach(b => {
            b.classList.remove('active');
            b.removeAttribute('aria-current');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-current', 'true');
          activeFilter = btn.dataset.filter;

          const titles = {
            all: 'All Tasks', pending: 'In Progress', completed: 'Completed',
            'priority-high': 'High Priority', 'priority-medium': 'Medium Priority', 'priority-low': 'Low Priority',
          };
          viewTitle.textContent = titles[activeFilter] || 'Tasks';

          // Hide completed section for completed filter (already shows them in pending slot)
          const completedSection = document.getElementById('completedSection');
          completedSection.style.display = activeFilter === 'completed' ? 'none' : '';

          renderFiltered();

          // Close sidebar on mobile
          if (window.innerWidth <= 680) closeSidebar();
        });
      });

      // ===== SEARCH =====
      searchInput.addEventListener('input', () => renderFiltered());

      // ===== COMPLETED COLLAPSE TOGGLE =====
      completedToggle.addEventListener('click', () => {
        completedCollapsed = !completedCollapsed;
        completedList.style.display = completedCollapsed ? 'none' : '';
        completedToggle.classList.toggle('collapsed', completedCollapsed);
        completedToggle.setAttribute('aria-expanded', !completedCollapsed);
      });

      // ===== BADGES =====
      function updateBadges() {
        document.getElementById('badge-all').textContent = allTodos.length;
        document.getElementById('badge-pending').textContent = allTodos.filter(t => t.status !== 'completed').length;
        document.getElementById('badge-completed').textContent = allTodos.filter(t => t.status === 'completed').length;
        document.getElementById('badge-high').textContent = allTodos.filter(t => (t.priority || 'none') === 'high').length;
        document.getElementById('badge-medium').textContent = allTodos.filter(t => (t.priority || 'none') === 'medium').length;
        document.getElementById('badge-low').textContent = allTodos.filter(t => (t.priority || 'none') === 'low').length;
      }

      // ===== LOGOUT =====
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/login/';
      });

      // ===== MOBILE SIDEBAR =====
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');

      function openSidebar() {
        sidebar.classList.add('open');
        overlay.classList.add('visible');
        document.body.style.overflow = 'hidden';
      }
      function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('visible');
        document.body.style.overflow = '';
      }

      document.getElementById('hamburgerBtn').addEventListener('click', openSidebar);
      overlay.addEventListener('click', closeSidebar);

      // ===== TOAST =====
      function showToast(msg, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transition = 'opacity 0.3s';
          setTimeout(() => toast.remove(), 300);
        }, 2800);
      }

      // ===== HELPERS =====
      function escHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
    </script>
  </body>
</html>
